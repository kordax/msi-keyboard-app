name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  packages:
    name: Packages (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            deb_arch: amd64
            rpm_arch: x86_64
          - arch: arm64
            runner: ubuntu-24.04-arm
            deb_arch: arm64
            rpm_arch: aarch64

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            cmake \
            dpkg-dev \
            file \
            g++ \
            libgl1-mesa-dev \
            qt6-base-dev \
            qt6-image-formats-plugins \
            qt6-l10n-tools \
            qt6-tools-dev \
            qt6-tools-dev-tools \
            rpm

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: "1.26.5"
          cache: false

      - name: Install Task
        run: |
          set -euo pipefail
          go install github.com/go-task/task/v3/cmd/task@v3.52.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build, test, smoke and package
        run: task package

      - name: Verify tag version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          package_version="$(
            sed -n 's/^set(CPACK_PACKAGE_VERSION "\(.*\)")$/\1/p' \
              build/release/CPackConfig.cmake
          )"
          if [[ -z "$package_version" || "$TAG" != "v$package_version" ]]; then
            echo "Tag $TAG does not match package version $package_version" >&2
            exit 1
          fi

      - name: Collect and verify packages
        env:
          DEB_ARCH: ${{ matrix.deb_arch }}
          RPM_ARCH: ${{ matrix.rpm_arch }}
        run: |
          set -euo pipefail
          mkdir -p dist
          find build/release -maxdepth 1 -type f \
            \( -name '*.deb' -o -name '*.rpm' \) \
            -exec cp '{}' dist/ \;

          mapfile -t deb_packages < <(find dist -maxdepth 1 -name '*.deb')
          mapfile -t rpm_packages < <(find dist -maxdepth 1 -name '*.rpm')
          test "${#deb_packages[@]}" -eq 1
          test "${#rpm_packages[@]}" -eq 1
          test "$(dpkg-deb --field "${deb_packages[0]}" Architecture)" = "$DEB_ARCH"
          test "$(rpm -qp --queryformat '%{ARCH}' "${rpm_packages[0]}")" = "$RPM_ARCH"

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: packages-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: packages
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          pattern: packages-*
          path: dist
          merge-multiple: true

      - name: Create SHA-256 checksums
        working-directory: dist
        run: |
          set -euo pipefail
          sha256sum *.deb *.rpm | sort --key=2 > SHA256SUMS
          sha256sum --check SHA256SUMS

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists; refusing to replace its assets." >&2
            exit 1
          fi
          gh release create "$TAG" dist/* \
            --generate-notes \
            --title "$TAG" \
            --verify-tag
